<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Trắc nghiệm KHVLĐC - Full Data</title>
    <style>
      :root {
        --bg: #f0f9ff;
        --card-bg: #ffffff;
        --primary: #0284c7;
        --accent: #f59e0b;
        --text: #1f2937;
        --correct: #10b981;
        --wrong: #ef4444;
      }
      body {
        margin: 0;
        padding: 20px;
        font-family: "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        justify-content: center;
        min-height: 100vh;
      }
      .container {
        max-width: 800px;
        width: 100%;
      }
      h1 {
        text-align: center;
        color: var(--primary);
        margin-bottom: 5px;
        text-transform: uppercase;
      }
      .sub {
        text-align: center;
        color: #6b7280;
        margin-bottom: 20px;
        font-size: 14px;
      }
      .card {
        background: var(--card-bg);
        padding: 30px;
        border-radius: 16px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        border-top: 5px solid var(--primary);
      }
      .stats {
        display: flex;
        justify-content: space-between;
        font-weight: bold;
        color: #6b7280;
        margin-bottom: 20px;
      }
      .question {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 25px;
        line-height: 1.5;
        color: #111827;
      }
      .options {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }
      @media (min-width: 600px) {
        .options {
          grid-template-columns: 1fr 1fr;
        }
      }
      button {
        background: #f9fafb;
        border: 2px solid #e5e7eb;
        padding: 15px;
        border-radius: 10px;
        text-align: left;
        cursor: pointer;
        font-size: 16px;
        color: var(--text);
        transition: 0.2s;
        display: flex;
        align-items: center;
      }
      button:hover:not(:disabled) {
        border-color: var(--primary);
        background: #e0f2fe;
      }
      button:disabled {
        opacity: 0.9;
        cursor: default;
      }
      .correct {
        background: #d1fae5 !important;
        border-color: var(--correct) !important;
        color: #064e3b !important;
        font-weight: bold;
      }
      .wrong {
        background: #fee2e2 !important;
        border-color: var(--wrong) !important;
        color: #991b1b !important;
      }
      .feedback {
        margin-top: 25px;
        padding: 20px;
        background: #fffbeb;
        border-radius: 8px;
        border-left: 5px solid var(--accent);
        display: none;
      }
      .nav-btn {
        width: 100%;
        background: var(--primary);
        color: white;
        border: none;
        font-weight: bold;
        padding: 15px;
        border-radius: 10px;
        margin-top: 20px;
        text-align: center;
        cursor: pointer;
        font-size: 16px;
      }
      .nav-btn:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Ôn Tập KHVLĐC</h1>
      <div class="sub">design by pham van thanh</div>

      <div class="card">
        <div class="stats">
          <span>Câu: <span id="qCount">1/0</span></span>
          <span>Điểm: <span id="score">0</span></span>
        </div>

        <div class="question" id="qText">Loading...</div>
        <div class="options" id="optContainer"></div>

        <div class="feedback" id="feedback">
          <div
            style="font-weight: bold; color: var(--accent); margin-bottom: 5px"
          >
            💡 Giải thích:
          </div>
          <div id="explain"></div>
        </div>

        <button
          class="nav-btn"
          id="nextBtn"
          onclick="nextQ()"
          style="display: none"
        >
          Câu tiếp theo ➜
        </button>
      </div>
    </div>

          q: "248- Vì sao các nguyên tố hợp kim có tác dụng tăng độ thấm tôi của thép:",
          o: [
            "a-Do dịch chuyển đường cong chữ C sang trái, tốc độ tôi tới hạn tăng",
            "b-Do dịch chuyển đường cong chữ C xuống dưới, tốc độ tôi tới hạn giảm",
            "c-Do dịch chuyển đường cong chữ C sang phải, tốc độ tôi tới hạn giảm",
            "d-Do dịch chuyển đường cong chữ C lên trên, tốc độ tôi tới hạn giảm",
          ],
          a: 2, // c
        },
      ];
      let queue = [];
      let currentIdx = 0;
      let score = 0;

      function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      function init() {
        queue = shuffle([...DATA]);
        currentIdx = 0;
        score = 0;
        render();
      }

      function render() {
        if (currentIdx >= queue.length) {
          document.querySelector(".card").innerHTML = `
                        <div style='text-align:center'>
                          <h2>Hoàn thành!</h2>
                          <p>Điểm số: ${score}/${queue.length}</p>
                          <button class='nav-btn' onclick='location.reload()'>Làm lại từ đầu</button>
                        </div>`;
          return;
        }

        const item = queue[currentIdx];
        document.getElementById("qCount").innerText = `${currentIdx + 1}/${
          queue.length
        }`;
        document.getElementById("score").innerText = score;

        // --- SỬA ĐỔI QUAN TRỌNG ĐỂ HIỆN ẢNH ---
        const qDiv = document.getElementById("qText");
        qDiv.innerHTML = ""; // Xóa nội dung cũ

        // 1. Tạo và hiện câu hỏi (chữ)
        const textNode = document.createElement("div");
        textNode.innerText = item.q;
        qDiv.appendChild(textNode);

        // 2. Kiểm tra xem có ảnh không, nếu có thì tạo thẻ <img>
        if (item.img && item.img.trim() !== "") {
          const imgNode = document.createElement("img");
          imgNode.src = item.img; // Đường dẫn ảnh lấy từ data
          imgNode.style.maxWidth = "100%"; // Giới hạn chiều rộng ảnh
          imgNode.style.display = "block"; // Xuống dòng
          imgNode.style.margin = "15px auto"; // Căn giữa và cách lề
          imgNode.style.borderRadius = "8px"; // Bo tròn góc cho đẹp
          imgNode.style.border = "1px solid #ddd"; // Viền mờ

          // Xử lý lỗi nếu ảnh không tìm thấy
          imgNode.onerror = function () {
            this.style.display = "none"; // Ẩn đi nếu lỗi ảnh
            console.log("Không tìm thấy ảnh: " + item.img);
          };

          qDiv.appendChild(imgNode);
        }
        // ----------------------------------------

        document.getElementById("feedback").style.display = "none";
        document.getElementById("nextBtn").style.display = "none";
        document.getElementById("explain").innerHTML = "";

        const optDiv = document.getElementById("optContainer");
        optDiv.innerHTML = "";

        item.o.forEach((opt, idx) => {
          const btn = document.createElement("button");
          btn.innerText = opt;
          btn.onclick = () => check(idx, item.a, btn, item);
          optDiv.appendChild(btn);
        });
      }
      function check(selected, correct, btn, item) {
        // Vô hiệu hóa các nút sau khi chọn
        const btns = document.querySelectorAll("#optContainer button");
        btns.forEach((b) => (b.disabled = true));

        if (selected === correct) {
          btn.classList.add("correct");
          score++;
        } else {
          btn.classList.add("wrong");

          btns[correct].classList.add("correct");
        }

        document.getElementById("feedback").style.display = "block";
        document.getElementById("nextBtn").style.display = "block";
      }

      function nextQ() {
        currentIdx++;
        render();
      }

      init();
    </script>
  </body>
</html>
